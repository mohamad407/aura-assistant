<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA - Neural Voice AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- AI NETWORK BACKGROUND -->
    <div class="ai-bg">
        <div class="grid-overlay"></div>
        <div class="scan-line"></div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="auth-screen" class="auth-container">
        <div class="auth-card">
            <div class="ai-core">
                <div class="core-ring"></div>
                <div class="core-ring"></div>
                <div class="core-center"></div>
            </div>
            <h1 class="glitch" data-text="AURA">AURA</h1>
            <p class="subtitle">NEURAL VOICE ASSISTANT</p>
            
            <div class="input-group">
                <input type="email" id="email-input" placeholder="Email Address" class="auth-input" required>
                <input type="password" id="password-input" placeholder="Password" class="auth-input" required>
            </div>
            
            <button id="signup-btn" class="auth-btn">INITIALIZE / LOGIN</button>
            
            <div class="divider">OR AUTHENTICATE WITH</div>
            
            <button id="google-btn" class="google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/2048px-Google_%22G%22_logo.svg.png" width="18" alt="G">
                Google Network
            </button>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="app-container" class="app-container" style="display: none;">
        <header class="dash-header">
            <div class="header-left">
                <div class="status-dot"></div>
                <span class="header-title">AURA OS</span>
            </div>
            <button id="logout-btn" class="logout-btn">DISCONNECT</button>
        </header>

        <!-- LIVE TIME & WEATHER WIDGET -->
        <div class="dash-info-bar">
            <div class="info-block">
                <span class="info-label">SYSTEM TIME</span>
                <span id="live-time" class="info-value">--:--:--</span>
                <span id="live-date" class="info-sub">Loading...</span>
            </div>
            <div class="info-divider"></div>
            <div class="info-block">
                <span class="info-label">INDIA WEATHER</span>
                <span id="weather-temp" class="info-value">--°C</span>
                <span id="weather-desc" class="info-sub">Offline</span>
            </div>
        </div>

        <!-- ACTIVE CHAT SECTION -->
        <div class="section-label">ACTIVE NEURAL LINK</div>
        <main class="active-chat-section" id="historyContainer">
            <div class="empty-state">
                <div class="empty-robot">🤖</div>
                <p>NEURAL CORE ONLINE</p>
                <span>Tap the orb below to communicate</span>
            </div>
        </main>

        <!-- HISTORY ARCHIVE SECTION -->
        <div class="section-label">ARCHIVE LOGS</div>
        <div class="session-history" id="sessionHistory">
            <div class="empty-state small"><p>Loading archives...</p></div>
        </div>

        <!-- AURA Floating Assistant Orb -->
        <div class="aura-container" id="auraContainer">
            <div class="speech-bubble" id="speechBubble">
                <span id="bubbleText">Tap to start</span>
            </div>
            <div class="aura-robot" id="auraRobot">
                <div class="orb-ring"></div>
                <div class="orb-ring"></div>
                <div class="orb-core">🤖</div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGJ-UxLAuQVKp0Up8WFUHmcIykai3F41o",
            authDomain: "aura-assistant-9468e.firebaseapp.com",
            projectId: "aura-assistant-9468e",
            storageBucket: "aura-assistant-9468e.firebasestorage.app",
            messagingSenderId: "907263465889",
            appId: "1:907263465889:web:edfcd5f03a9f389e9d53e0",
            measurementId: "G-Y1BLMDRB2K"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAuth = {
            auth, provider, signInWithPopup, createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, signOut, onAuthStateChanged
        };
        
        const script = document.createElement('script');
        script.src = 'app.js';
        document.body.appendChild(script);
    </script>
</body>
</html>
